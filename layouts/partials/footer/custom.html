<script>
(function() {
    document.body.classList.add('anim-ready');

    var observer = new IntersectionObserver(
        function(entries) {
            entries.forEach(function(entry) {
                if (entry.isIntersecting) {
                    entry.target.classList.add('is-visible');
                    observer.unobserve(entry.target);
                }
            });
        },
        { threshold: 0.05, rootMargin: '0px 0px -30px 0px' }
    );

    function initAnimations() {
        var articles = document.querySelectorAll('.article-list article:not(.is-visible)');
        for (var i = 0; i < articles.length; i++) {
            articles[i].style.transitionDelay = (i * 0.1) + 's';
            observer.observe(articles[i]);
        }

        var widgets = document.querySelectorAll('.sidebar .widget:not(.is-visible)');
        for (var j = 0; j < widgets.length; j++) {
            widgets[j].style.transitionDelay = (0.3 + j * 0.12) + 's';
            observer.observe(widgets[j]);
        }

        var tocs = document.querySelectorAll('.widget--toc:not(.is-visible)');
        for (var k = 0; k < tocs.length; k++) observer.observe(tocs[k]);

        var headings = document.querySelectorAll('.article-content h2:not(.is-visible), .article-content h3:not(.is-visible)');
        for (var m = 0; m < headings.length; m++) {
            headings[m].style.transitionDelay = (m * 0.05) + 's';
            observer.observe(headings[m]);
        }

        var highlights = document.querySelectorAll('.article-content .highlight:not(.is-visible)');
        for (var n = 0; n < highlights.length; n++) {
            highlights[n].style.transitionDelay = (n * 0.08) + 's';
            observer.observe(highlights[n]);
        }

        var scrollEls = document.querySelectorAll('.animate-on-scroll:not(.is-visible)');
        for (var p = 0; p < scrollEls.length; p++) observer.observe(scrollEls[p]);
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initAnimations);
    } else {
        initAnimations();
    }

    // swup: 풀 리로드 없이 .main-container 영역만 교체.
    // body class와 main-container class도 응답 HTML에서 직접 동기화 (테마 CSS가 page-type별 class에 의존)
    function syncContainerClass(visit) {
        var newDoc = visit && visit.to && visit.to.document;
        var newHtml = visit && visit.to && visit.to.html;
        var bodyClass = '';
        var containerClass = '';

        if (newDoc) {
            if (newDoc.body) bodyClass = newDoc.body.className || '';
            var newContainer = newDoc.querySelector('.main-container');
            if (newContainer) containerClass = newContainer.className || '';
        } else if (newHtml) {
            var bm = newHtml.match(/<body[^>]*class=["']([^"']*)["']/i);
            if (bm) bodyClass = bm[1];
            var cm = newHtml.match(/<div[^>]*class=["']([^"']*main-container[^"']*)["']/i);
            if (cm) containerClass = cm[1];
        }

        document.body.className = (bodyClass + ' anim-ready').trim();
        if (containerClass) {
            var current = document.querySelector('.main-container');
            if (current) current.className = containerClass;
        }
    }

    function initSwup() {
        if (typeof Swup === 'undefined') return;
        var swup = new Swup({
            containers: ['.main-container'],
            animationSelector: false
        });
        swup.hooks.on('content:replace', function(visit) {
            syncContainerClass(visit);
            initAnimations();
            if (window.Stack && typeof window.Stack.init === 'function') {
                window.Stack.init();
            }
            if (typeof window.gtag === 'function') {
                window.gtag('event', 'page_view', {
                    page_path: location.pathname + location.search,
                    page_location: location.href,
                    page_title: document.title
                });
            }
        });
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initSwup);
    } else {
        initSwup();
    }
})();
</script>
